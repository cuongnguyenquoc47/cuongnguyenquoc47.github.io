<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="cGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd766" />
      <stop offset="1" stop-color="#e0a63a" />
    </linearGradient>
  </defs>
  <!-- Rounded dark tile -->
  <rect width="100" height="100" rx="24" fill="#181818" />
  <!-- Gold ring -->
  <circle cx="50" cy="50" r="27" fill="none" stroke="url(#cGold)" stroke-width="15" />
  <!-- Cut an opening on the right to form the letter C -->
  <polygon points="50,50 96,12 104,50 96,88" fill="#181818" />
</svg>
